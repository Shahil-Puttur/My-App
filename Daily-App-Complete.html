                this.state = { profile: null, taskTemplates: [], dailyTasks: [], knowledge: [], xp: 0, level: 1, streak: 0, lastActiveDate: null, buildingFloors: 0, lastBuildDate: null, isOnboarded: false };
                this.listeners = [];
                this.loadFromStorage();
            }
            loadFromStorage() { try { const stored = localStorage.getItem('daily-work-storage'); if (stored) { const data = JSON.parse(stored); this.state = { ...this.state, ...data }; } } catch (e) { console.error('Failed to load from storage:', e); } }
            saveToStorage() { try { localStorage.setItem('daily-work-storage', JSON.stringify(this.state)); } catch (e) { console.error('Failed to save to storage:', e); } }
            subscribe(listener) { this.listeners.push(listener); return () => { this.listeners = this.listeners.filter(l => l !== listener); }; }
            notify() { this.saveToStorage(); this.listeners.forEach(listener => listener(this.state)); }
            setState(updates) { this.state = { ...this.state, ...updates }; this.notify(); }
            setProfile(profile) { this.setState({ profile }); }
            addTaskTemplate(task) { const newTask = { ...task, id: generateId() }; this.setState({ taskTemplates: [...this.state.taskTemplates, newTask] }); }
            completeTask(id, timeSpent, description) { const updatedTasks = this.state.dailyTasks.map(t => t.id === id ? { ...t, completed: true, timeSpent, description } : t); const task = this.state.dailyTasks.find(t => t.id === id); let newXp = this.state.xp; let newLevel = this.state.level; if (task && !task.completed) { newXp += 50 + Math.floor(timeSpent / 10) * 5; newLevel = Math.floor(newXp / 1000) + 1; } this.setState({ dailyTasks: updatedTasks, xp: newXp, level: newLevel }); }
            addExtraTask(task) { const newTask = { ...task, id: generateId(), completed: false, isExtra: true, date: getTodayStr() }; this.setState({ dailyTasks: [...this.state.dailyTasks, newTask] }); }
            syncDailyTasks() { const today = getTodayStr(); const todaysTasks = this.state.dailyTasks.filter(t => t.date === today); const missingTemplates = this.state.taskTemplates.filter(template => !todaysTasks.some(t => t.templateId === template.id)); if (missingTemplates.length === 0) return; const newTasks = missingTemplates.map(template => ({ id: generateId(), templateId: template.id, name: template.name, timeSpent: 0, description: '', date: today, completed: false, isExtra: false, image: template.image, minTime: template.minTime })); this.setState({ dailyTasks: [...this.state.dailyTasks, ...newTasks] }); }
            addKnowledge(item) { const newItem = { ...item, id: generateId(), date: getTodayStr() }; this.setState({ knowledge: [...this.state.knowledge, newItem] }); }
            buildFloor() { const today = getTodayStr(); if (this.state.lastBuildDate === today) return; this.setState({ buildingFloors: this.state.buildingFloors + 1, lastBuildDate: today }); }
            checkBuildingCollapse() { if (!this.state.lastBuildDate) return; const today = getTodayStr(); if (this.state.lastBuildDate === today) return; const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1); const yesterdayStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth() + 1).padStart(2, '0')}-${String(yesterday.getDate()).padStart(2, '0')}`; if (this.state.lastBuildDate !== yesterdayStr) { this.setState({ buildingFloors: 0, lastBuildDate: null }); } }
            checkStreak() { const today = getTodayStr(); if (this.state.lastActiveDate === today) return; const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1); const yesterdayStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth() + 1).padStart(2, '0')}-${String(yesterday.getDate()).padStart(2, '0')}`; let newStreak = this.state.streak; if (this.state.lastActiveDate === yesterdayStr) { newStreak += 1; } else if (this.state.lastActiveDate !== today) { newStreak = 1; } this.setState({ streak: newStreak, lastActiveDate: today }); }
            completeOnboarding() { this.setState({ isOnboarded: true }); }
        }

        const store = new Store();

        let currentState = { ...store.state };
        let onboardingStep = 1;
        let profileData = { name: '', city: '', class: '', goal: '', avatar: '' };
        let taskData = { name: '', minTime: '', image: '' };
        let selectedKnowledgeCategory = 'All';
        let knowledgeSearchQuery = '';
        let selectedReportType = 'weekly';
        let petTips = ["Stay focused! You're doing great.", "Remember to take a 5-minute break.", "Consistency is the key to success!", "Drink some water 💧", "You're leveling up fast!", "Keep that streak alive 🔥", "Learning something new today?"];

            return `<div class="onboarding-container"><div class="onboarding-bg"><div class="glow-blue"></div><div class="glow-purple"></div></div><div class="onboarding-card"><div class="onboarding-header"><h1 class="onboarding-title">${onboardingStep === 1 ? 'Welcome to Daily Work' : 'Set Your Daily Goals'}</h1><p class="onboarding-subtitle">${onboardingStep === 1 ? "Let's set up your premium profile." : 'Add the tasks you want to accomplish every day.'}</p></div>${onboardingStep === 1 ? `<div class="space-y-6"><div class="avatar-upload"><div class="avatar-box" id="avatarBox">${profileData.avatar ? `<img src="${profileData.avatar}" alt="Avatar">` : '<div class="avatar-placeholder"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg><span class="avatar-placeholder-text">Avatar Image</span></div>'}<input type="file" id="avatarInput" class="avatar-input" accept="image/*"></div><p class="avatar-hint">Upload an image (no background preferred)</p></div><div class="form-grid"><div class="form-field"><label class="form-field-label">Name</label><input type="text" id="nameInput" class="form-input" placeholder="Shahil" value="${profileData.name}"></div><div class="form-field"><label class="form-field-label">City</label><input type="text" id="cityInput" class="form-input" placeholder="Mumbai" value="${profileData.city}"></div><div class="form-field"><label class="form-field-label">Class / Profession</label><input type="text" id="classInput" class="form-input" placeholder="B.Tech CS" value="${profileData.class}"></div><div class="form-field"><label class="form-field-label">Main Goal</label><input type="text" id="goalInput" class="form-input" placeholder="Become a DevOps Engineer" value="${profileData.goal}"></div></div><button class="btn btn-primary btn-lg w-full" id="continueBtn">Continue<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left: 0.5rem;"><polyline points="9 18 15 12 9 6"></polyline></svg></button></div>` : `<div class="space-y-6"><div class="task-template-grid" id="taskTemplateGrid">${currentState.taskTemplates.map(task => `<div class="task-template-card"><img src="${task.image}" alt="${task.name}"><div class="task-template-overlay"><div class="task-template-name">${task.name}</div><div class="task-template-time">${task.minTime} mins minimum</div></div></div>`).join('')}<div class="task-template-add" id="addTaskBtn"><div class="task-template-add-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></div><span class="task-template-add-text">Add Daily Work</span></div></div><button class="btn btn-primary btn-lg w-full" id="startBtn" ${currentState.taskTemplates.length === 0 ? 'disabled' : ''}>Start My Journey<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left: 0.5rem;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg></button></div><div id="addTaskModal" class="modal-backdrop"><div class="modal"><div class="modal-content"><div class="modal-header"><h2 class="modal-title">Add Daily Task</h2><button class="modal-close" id="closeTaskModal"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button></div><div class="modal-body"><div class="space-y-4"><div class="relative flex h-40 w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl border-2 border-dashed border-white/20 bg-white/5 hover:bg-white/10 transition-colors" id="taskImageBox">${taskData.image ? `<img src="${taskData.image}" alt="Preview" style="height: 100%; width: 100%; object-fit: cover;">` : '<div class="flex flex-col items-center text-gray-400"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg><span class="mt-2 text-sm">Upload 16:9 Image</span></div>'}<input type="file" id="taskImageInput" class="absolute inset-0 cursor-pointer opacity-0" accept="image/*"></div><div class="space-y-2"><label class="text-sm font-medium text-gray-300">Task Name</label><input type="text" id="taskNameInput" class="form-input" placeholder="e.g., DevOps Learning" value="${taskData.name}"></div><div class="space-y-2"><label class="text-sm font-medium text-gray-300">Minimum Time (minutes)</label><input type="number" id="minTimeInput" class="form-input" placeholder="e.g., 30" value="${taskData.minTime}"></div><button class="btn btn-primary w-full mt-4" id="saveTaskBtn">Save Task</button></div></div></div></div>`}</div></div>`;
        }

            return `<div class="app-container"><div class="background-glow"><div class="glow-blue"></div><div class="glow-purple"></div></div><aside class="sidebar"><div class="sidebar-header"><div class="sidebar-logo"><div class="sidebar-logo-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg></div><div class="sidebar-logo-text"><span class="sidebar-logo-title">Daily Work</span><span class="sidebar-logo-subtitle">By Shahil</span></div></div></div><nav class="sidebar-nav"><div class="nav-item ${currentPage === 'dashboard' ? 'active' : ''}" data-page="dashboard"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>Dashboard</div><div class="nav-item ${currentPage === 'knowledge' ? 'active' : ''}" data-page="knowledge"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>Knowledge</div><div class="nav-item ${currentPage === 'reports' ? 'active' : ''}" data-page="reports"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>Reports</div><div class="nav-item ${currentPage === 'profile' ? 'active' : ''}" data-page="profile"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>Profile</div></nav><div class="sidebar-profile"><div class="profile-card"><div class="profile-avatar">${currentState.profile?.avatarImage ? `<img src="${currentState.profile.avatarImage}" alt="Avatar">` : '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>'}</div><div class="profile-info"><span class="profile-name">${currentState.profile?.name || 'User'}</span><span class="profile-level">Lvl ${currentState.level} • ${currentState.xp} XP</span></div><div class="profile-streak"><span class="profile-streak-value">${currentState.streak}</span><span>🔥</span></div></div></div></aside><main class="main-content"><div class="content-area"><div class="content-wrapper">${currentPage === 'dashboard' ? renderDashboard(todaysTasks) : currentPage === 'knowledge' ? renderKnowledge() : currentPage === 'reports' ? renderReports() : renderProfile()}</div></div></main><nav class="mobile-nav pb-safe"><div class="mobile-nav-item ${currentPage === 'dashboard' ? 'active' : ''}" data-page="dashboard"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg><span>Dashboard</span></div><div class="mobile-nav-item ${currentPage === 'knowledge' ? 'active' : ''}" data-page="knowledge"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg><span>Knowledge</span></div><div class="mobile-nav-item ${currentPage === 'reports' ? 'active' : ''}" data-page="reports"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg><span>Reports</span></div><div class="mobile-nav-item ${currentPage === 'profile' ? 'active' : ''}" data-page="profile"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>Profile</span></div></nav><div class="pet-assistant"><div class="pet-message" id="petMessage"><p id="petMessageText"></p><button class="pet-message-close" id="petMessageClose"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button><div class="pet-message-tail"></div></div><div class="pet-button" id="petButton"><span>🐦</span><div class="pet-level-badge">${currentState.level}</div></div></div><div id="extraTaskModal" class="modal-backdrop"><div class="modal"><div class="modal-content"><div class="modal-header"><h2 class="modal-title">Add Extra Task</h2><button class="modal-close" id="closeExtraModal"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button></div><div class="modal-body"><div class="space-y-4"><div class="space-y-2"><label class="text-sm font-medium text-gray-300">Task Name</label><input type="text" id="extraTaskName" class="form-input" placeholder="e.g., Read a book"></div><div class="space-y-2"><label class="text-sm font-medium text-gray-300">Time Spent (minutes)</label><input type="number" id="extraTaskTime" class="form-input" placeholder="e.g., 45"></div><div class="space-y-2"><label class="text-sm font-medium text-gray-300">What I Learned / Did</label><textarea id="extraTaskDesc" class="form-textarea" placeholder="Describe your achievement..."></textarea></div><button class="btn btn-primary w-full mt-4" id="addExtraBtn">Add & Complete</button></div></div></div></div></div></div>`;
        }

ght="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 0.5rem;"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>${task.timeSpent} mins completed</div><p class="text-sm text-gray-300 italic">"${task.description}"</p></div>`}</div></div></div>`;
        }

        function renderKnowledge() {
            const categories = ['All', ...Array.from(new Set(currentState.knowledge.map(k => k.category)))];
            const filteredKnowledge = currentState.knowledge.filter(k => {
                const matchesSearch = k.question.toLowerCase().includes(knowledgeSearchQuery.toLowerCase()) || k.answer.toLowerCase().includes(knowledgeSearchQuery.toLowerCase());
                const matchesCategory = selectedKnowledgeCategory === 'All' || k.category === selectedKnowledgeCategory;
                return matchesSearch && matchesCategory;
            });
            return `<div class="space-y-8 pb-20 md:pb-0"><div class="flex flex-col md:flex-row md:items-center justify-between gap-4"><div><h1 class="page-title"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>Learned Questions</h1><p class="page-subtitle">Your personal knowledge repository.</p></div><div class="flex gap-3"><button class="btn btn-outline" id="exportPdfBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 0.5rem;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>Export PDF</button><button class="btn btn-primary" id="addKnowledgeBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 0.5rem;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>Add Knowledge</button></div></div><div class="flex flex-col md:flex-row gap-4"><div class="search-input-wrapper"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg><input type="text" id="knowledgeSearch" class="form-input search-input" placeholder="Search questions or answers..." value="${knowledgeSearchQuery}"></div><div class="filter-pills hide-scrollbar">${categories.map(cat => `<button class="filter-pill ${selectedKnowledgeCategory === cat ? 'active' : ''}" data-category="${cat}">${cat}</button>`).join('')}</div></div><div class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">${filteredKnowledge.map(item => `<div class="knowledge-card"><div class="knowledge-card-content"><div class="knowledge-card-header"><span class="knowledge-card-category">${item.category}</span><span class="knowledge-card-date">${item.date}</span></div><h3 class="knowledge-card-question">${item.question}</h3><p class="knowledge-card-answer">${item.answer}</p></div></div>`).join('')}${filteredKnowledge.length === 0 ? '<div class="col-span-full empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="empty-state-icon"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg><p>No knowledge found. Start adding some!</p></div>' : ''}</div><div id="knowledgeModal" class="modal-backdrop"><div class="modal"><div class="modal-content"><div class="modal-header"><h2 class="modal-title">Add New Knowledge</h2><button class="modal-close" id="closeKnowledgeModal"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button></div><div class="modal-body"><div class="space-y-4"><div class="space-y-2"><label class="text-sm font-medium text-gray-300">Category</label><input type="text" id="knowledgeCategoryInput" class="form-input" placeholder="e.g., Business, Tech, React"></div><div class="space-y-2"><label class="text-sm font-medium text-gray-300">Questions & Answers</label><textarea id="knowledgeQaInput" class="form-textarea" placeholder="Paste multiple questions and answers:\n\nQ1. What is CPU?\nA1. Central Processing Unit\n\nQ2. What is GPS?\nA2. Global Positioning System"></textarea></div><button class="btn btn-primary w-full mt-4" id="saveKnowledgeBtn">Save Knowledge</button></div></div></div></div></div>`;
        }

        function renderReports() {
            const days = selectedReportType === 'weekly' ? 7 : selectedReportType === 'monthly' ? 30 : 90;
            const data = [];
            for (let i = days - 1; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                const displayDate = `${d.getDate()}/${d.getMonth() + 1}`;
                const tasksOnDate = currentState.dailyTasks.filter(t => t.date === dateStr && t.completed);
                const totalTime = tasksOnDate.reduce((sum, t) => sum + (t.timeSpent || 0), 0);
                data.push({ date: displayDate, fullDate: dateStr, tasks: tasksOnDate.length, time: totalTime });
            }
            const totalTimeSpent = data.reduce((sum, d) => sum + d.time, 0);
            const totalTasksDone = data.reduce((sum, d) => sum + d.tasks, 0);
            return `<div class="space-y-8 pb-20 md:pb-0"><div class="flex flex-col md:flex-row md:items-center justify-between gap-4"><div><h1 class="page-title"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>Analytics & Reports</h1><p class="page-subtitle">Track your progress and consistency.</p></div><button class="btn btn-outline" id="exportReportPdfBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 0.5rem;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>Export PDF</button></div><div class="report-type-selector"><button class="report-type-btn ${selectedReportType === 'weekly' ? 'active' : ''}" data-report-type="weekly">Weekly Report</button><button class="report-type-btn ${selectedReportType === 'monthly' ? 'active' : ''}" data-report-type="monthly">Monthly Report</button><button class="report-type-btn ${selectedReportType === 'all' ? 'active' : ''}" data-report-type="all">90-Day Report</button></div><div id="report-content" class="space-y-6"><div class="grid gap-6 md:grid-cols-2"><div class="stat-card"><div class="stat-card-content"><div class="stat-card-header"><h3 class="stat-card-label">Total Time Spent</h3><div class="stat-card-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: rgb(96, 165, 250);"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></div></div><div class="stat-card-value">${Math.floor(totalTimeSpent / 60)}h ${totalTimeSpent % 60}m</div><p class="stat-card-subtitle">Total minutes tracked</p></div></div><div class="stat-card"><div class="stat-card-content"><div class="stat-card-header"><h3 class="stat-card-label">Tasks Completed</h3><div class="stat-card-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: rgb(192, 132, 250);"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg></div></div><div class="stat-card-value">${totalTasksDone}</div><p class="stat-card-subtitle">Tasks completed</p></div></div></div></div></div>`;
        }

        function renderProfile() {
            const completedTasks = currentState.dailyTasks.filter(t => t.completed).length;
            const totalTasks = currentState.dailyTasks.length;
            const completionRate = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
            return `<div class="space-y-8 pb-20 md:pb-0"><div class="flex flex-col md:flex-row md:items-center justify-between gap-4"><div><h1 class="page-title"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>Player Profile</h1><p class="page-subtitle">Your stats, achievements, and identity.</p></div></div><div class="profile-stats-grid"><div class="profile-avatar-card"><div class="profile-avatar-card-bg"></div><div class="profile-avatar-card-content"><div class="profile-avatar-large">${currentState.profile?.avatarImage ? `<img src="${currentState.profile.avatarImage}" alt="Avatar">` : '<div class="profile-avatar-large-placeholder"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>'}</div><h2 class="profile-name-display">${currentState.profile?.name || 'User'}</h2><p class="profile-class-display">${currentState.profile?.className || 'Not set'}</p><div class="profile-city-display"><span>📍 ${currentState.profile?.city || 'Not set'}</span></div></div></div><div class="profile-stats-grid-2"><div class="stat-card"><div class="stat-card-content"><div class="stat-card-header"><h3 class="stat-card-label">Level & XP</h3><div class="stat-card-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: rgb(250, 204, 21);"><polygon points="12 2 15.09 10.26 24 10.35 17.77 16.01 19.85 24.29 12 18.77 4.15 24.29 6.23 16.01 0 10.35 8.91 10.26 12 2"></polygon></svg></div></div><div class="stat-card-value">Lvl ${currentState.level}</div><p class="stat-card-subtitle">${currentState.xp} Total XP</p></div></div><div class="stat-card"><div class="stat-card-content"><div class="stat-card-header"><h3 class="stat-card-label">Consistency Streak</h3><div class="stat-card-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: rgb(251, 146, 60);"><path d="M6.5 1h11l3.5 6v12a2 2 0 0 1-2 2h-12a2 2 0 0 1-2-2V7z"></path><path d="M9 16h6"></path><path d="M9 12h6"></path></svg></div></div><div class="stat-card-value">${currentState.streak} Days</div><p class="stat-card-subtitle">Keep the fire burning!</p></div></div><div class="stat-card"><div class="stat-card-content"><div class="stat-card-header"><h3 class="stat-card-label">Completion Rate</h3><div class="stat-card-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: rgb(74, 222, 128);"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"></path></svg></div></div><div class="stat-card-value">${completionRate}%</div><p class="stat-card-subtitle">${completedTasks} of ${totalTasks} tasks done</p></div></div><div class="stat-card"><div class="stat-card-content"><div class="stat-card-header"><h3 class="stat-card-label">Main Goal</h3><div class="stat-card-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: rgb(192, 132, 250);"><circle cx="12" cy="12" r="10"></circle><polyline points="12 8 12 12 15 15"></polyline></svg></div></div><div class="stat-card-value" style="font-size: 1.125rem;">${currentState.profile?.goal || 'Not set'}</div><p class="stat-card-subtitle">Your ultimate objective</p></div></div></div></div>`;
        }

        function attachOnboardingListeners() {
            if (onboardingStep === 1) {
                document.getElementById('avatarInput')?.addEventListener('change', async (e) => { const file = e.target.files?.[0]; if (file) { profileData.avatar = await compressImage(file); render(); } });
                document.getElementById('nameInput')?.addEventListener('input', (e) => { profileData.name = e.target.value; });
                document.getElementById('cityInput')?.addEventListener('input', (e) => { profileData.city = e.target.value; });
                document.getElementById('classInput')?.addEventListener('input', (e) => { profileData.class = e.target.value; });
                document.getElementById('goalInput')?.addEventListener('input', (e) => { profileData.goal = e.target.value; });
                document.getElementById('continueBtn')?.addEventListener('click', () => {
                    if (profileData.name && profileData.city && profileData.class && profileData.goal) {
                        store.setProfile({ name: profileData.name, city: profileData.city, className: profileData.class, goal: profileData.goal, avatarImage: profileData.avatar });
                        onboardingStep = 2;
                        render();
                    }
                });
            } else {
                document.getElementById('addTaskBtn')?.addEventListener('click', () => { document.getElementById('addTaskModal').classList.add('active'); });
                document.getElementById('closeTaskModal')?.addEventListener('click', () => { document.getElementById('addTaskModal').classList.remove('active'); });
                document.getElementById('taskImageInput')?.addEventListener('change', async (e) => { const file = e.target.files?.[0]; if (file) { taskData.image = await compressImage(file); render(); } });
                document.getElementById('taskNameInput')?.addEventListener('input', (e) => { taskData.name = e.target.value; });
                document.getElementById('minTimeInput')?.addEventListener('input', (e) => { taskData.minTime = e.target.value; });
                document.getElementById('saveTaskBtn')?.addEventListener('click', () => {
                    if (taskData.name && taskData.minTime && taskData.image) {
                        store.addTaskTemplate({ name: taskData.name, minTime: parseInt(taskData.minTime), image: taskData.image });
                        taskData = { name: '', minTime: '', image: '' };
                        render();
                    }
                });
                document.getElementById('startBtn')?.addEventListener('click', () => { if (currentState.taskTemplates.length > 0) { store.completeOnboarding(); } });
            }
        }

        function attachAppListeners() {
            store.checkStreak();
            store.syncDailyTasks();
            document.querySelectorAll('[data-page]').forEach(el => { el.addEventListener('click', () => { currentPage = el.dataset.page; render(); }); });
            document.getElementById('addExtraTaskBtn')?.addEventListener('click', () => { document.getElementById('extraTaskModal').classList.add('active'); });
            document.getElementById('closeExtraModal')?.addEventListener('click', () => { document.getElementById('extraTaskModal').classList.remove('active'); });
            document.getElementById('addExtraBtn')?.addEventListener('click', () => {
                const name = document.getElementById('extraTaskName')?.value;
                const time = document.getElementById('extraTaskTime')?.value;
                const desc = document.getElementById('extraTaskDesc')?.value;
                if (name && time && desc) {
                    store.addExtraTask({ name, timeSpent: parseInt(time), description: desc, image: 'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=1600' });
                    document.getElementById('extraTaskName').value = '';
                    document.getElementById('extraTaskTime').value = '';
                    document.getElementById('extraTaskDesc').value = '';
                    document.getElementById('extraTaskModal').classList.remove('active');
                }
            });
            document.querySelectorAll('.task-complete-btn').forEach(btn => { btn.addEventListener('click', () => {
                const taskId = btn.dataset.taskId;
                const timeInput = document.querySelector(`.task-time-input[data-task-id="${taskId}"]`);
                const descInput = document.querySelector(`.task-desc-input[data-task-id="${taskId}"]`);
                const time = parseInt(timeInput?.value) || 0;
                const desc = descInput?.value || '';
                const task = currentState.dailyTasks.find(t => t.id === taskId);
                if (time && desc && (!task?.minTime || time >= task.minTime)) {
                    store.completeTask(taskId, time, desc);
                    store.buildFloor();
                    confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#3b82f6', '#8b5cf6', '#ffffff'] });
                    confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#3b82f6', '#8b5cf6', '#ffffff'] });
                } else {
                    alert(task?.minTime ? `Please spend at least ${task.minTime} minutes on this task.` : 'Please fill in all fields.');
                }
            }); });
            document.getElementById('addKnowledgeBtn')?.addEventListener('click', () => { document.getElementById('knowledgeModal').classList.add('active'); });
            document.getElementById('closeKnowledgeModal')?.addEventListener('click', () => { document.getElementById('knowledgeModal').classList.remove('active'); });
            document.getElementById('knowledgeSearch')?.addEventListener('input', (e) => { knowledgeSearchQuery = e.target.value; render(); });
            document.querySelectorAll('[data-category]').forEach(btn => { btn.addEventListener('click', () => { selectedKnowledgeCategory = btn.dataset.category; render(); }); });
            document.getElementById('saveKnowledgeBtn')?.addEventListener('click', () => {
                const category = document.getElementById('knowledgeCategoryInput')?.value;
                const qaText = document.getElementById('knowledgeQaInput')?.value;
                if (category && qaText) {
                    const lines = qaText.split('\n').map(line => line.trim()).filter(line => line);
                    const items = [];
                    let currentQ = '', currentA = '';
                    lines.forEach(line => {
                        const qMatch = line.match(/^(?:Q|Question)\s*\d*[\.\:\-]?\s*(.*)/i);
                        const aMatch = line.match(/^(?:A|Answer)\s*\d*[\.\:\-]?\s*(.*)/i);
                        if (qMatch) { if (currentQ && currentA) { items.push({ question: currentQ, answer: currentA }); currentA = ''; } currentQ = qMatch[1].trim(); } else if (aMatch) { currentA = aMatch[1].trim(); } else { if (currentA) { currentA += '\n' + line; } else if (currentQ) { currentQ += '\n' + line; } else { currentQ = line; } }
                    });
                    if (currentQ && currentA) { items.push({ question: currentQ, answer: currentA }); } else if (currentQ && !currentA && items.length === 0) { items.push({ question: currentQ, answer: '' }); }
                    if (items.length > 0) { items.forEach(item => { store.addKnowledge({ category, question: item.question, answer: item.answer }); }); } else { store.addKnowledge({ category, question: 'Note', answer: qaText }); }
                    document.getElementById('knowledgeCategoryInput').value = '';
                    document.getElementById('knowledgeQaInput').value = '';
                    document.getElementById('knowledgeModal').classList.remove('active');
                }
            });
            document.querySelectorAll('[data-report-type]').forEach(btn => { btn.addEventListener('click', () => { selectedReportType = btn.dataset.reportType; render(); }); });
            document.getElementById('petButton')?.addEventListener('click', () => {
                const msg = petTips[Math.floor(Math.random() * petTips.length)];
                const petMessage = document.getElementById('petMessage');
                document.getElementById('petMessageText').textContent = msg;
                petMessage.classList.add('active');
                clearTimeout(petMessageTimeout);
                petMessageTimeout = setTimeout(() => { petMessage.classList.remove('active'); }, 5000);
            });
            document.getElementById('petMessageClose')?.addEventListener('click', () => { document.getElementById('petMessage').classList.remove('active'); });
            setInterval(() => { if (Math.random() > 0.7) { document.getElementById('petButton')?.click(); } }, 30000);
        }

        render();
    </script>
</body>
</html>
